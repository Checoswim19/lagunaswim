<script>
'use strict';
(function realismPatch() {

  // ──────────────────────────────────────────────
  // 1) AGUA VIVA: doble capa de oleaje + caustics
  //    (reemplaza drawWavePattern original)
  // ──────────────────────────────────────────────
  window.drawWavePattern = function drawWavePattern() {
    const t = State.animTime;
    const camX = State.camera.x, camY = State.camera.y;
    const x1 = camX + viewW + 80, y1 = camY + viewH + 80;

    ctx.save();

    // CAPA A — oleaje grande que avanza en diagonal (lento)
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 1.2;
    const offA = (t * 0.018) % 90;
    for (let y = Math.floor(camY / 70) * 70; y < y1; y += 70) {
      ctx.beginPath();
      for (let x = Math.floor(camX / 30) * 30 - 90; x < x1; x += 30) {
        const yy = y + Math.sin((x + offA * 2) * 0.018 + t * 0.0012) * 9
                     + Math.sin(x * 0.005 + t * 0.0007) * 5;
        if (x <= Math.floor(camX / 30) * 30 - 90) ctx.moveTo(x + offA, yy);
        else ctx.lineTo(x + offA, yy);
      }
      ctx.stroke();
    }

    // CAPA B — rizo corto en sentido contrario (rápido, más tenue)
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.8;
    const offB = (-t * 0.03) % 60;
    for (let y = Math.floor(camY / 46) * 46 + 20; y < y1; y += 46) {
      ctx.beginPath();
      for (let x = Math.floor(camX / 24) * 24 - 60; x < x1; x += 24) {
        const yy = y + Math.sin((x - offB) * 0.03 + t * 0.002) * 4;
        if (x <= Math.floor(camX / 24) * 24 - 60) ctx.moveTo(x + offB, yy);
        else ctx.lineTo(x + offB, yy);
      }
      ctx.stroke();
    }

    // CAUSTICS — reflejos de sol (red de manchas claras que respiran)
    // Celdas grandes; cada celda dibuja un anillo suave cuya intensidad
    // y tamaño oscilan con fases distintas → patrón de luz sobre el agua.
    const cell = 150;
    const gx0 = Math.floor(camX / cell), gy0 = Math.floor(camY / cell);
    const gx1 = Math.ceil(x1 / cell), gy1 = Math.ceil(y1 / cell);
    for (let gy = gy0; gy <= gy1; gy++) {
      for (let gx = gx0; gx <= gx1; gx++) {
        // hash determinístico por celda
        const h = ((gx * 73856093) ^ (gy * 19349663)) >>> 0;
        const ph = (h % 628) / 100;
        const jx = ((h >> 3) % 100) / 100 * cell * 0.6;
        const jy = ((h >> 7) % 100) / 100 * cell * 0.6;
        const pulse = Math.sin(t * 0.0011 + ph);
        const a = 0.035 + pulse * 0.03;
        if (a <= 0.012) continue;
        const r = 34 + Math.sin(t * 0.0008 + ph * 2) * 10;
        const cx2 = gx * cell + cell * 0.2 + jx + Math.sin(t * 0.0004 + ph) * 14;
        const cy2 = gy * cell + cell * 0.2 + jy + Math.cos(t * 0.0005 + ph) * 10;
        const g = ctx.createRadialGradient(cx2, cy2, r * 0.25, cx2, cy2, r);
        g.addColorStop(0, 'rgba(255,255,255,' + a.toFixed(3) + ')');
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx2, cy2, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // DESTELLOS DE SOL — chispas blancas que titilan en las crestas
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    for (let i = 0; i < 26; i++) {
      const h = (i * 2654435761) >>> 0;
      const sx = camX + ((h % 1000) / 1000) * viewW;
      const sy = camY + (((h >> 5) % 1000) / 1000) * viewH;
      if (typeof isOnLand === 'function' && isOnLand(sx, sy)) continue;
      const tw = Math.sin(t * 0.004 + i * 1.7);
      if (tw < 0.82) continue;           // sólo titila a ratos
      const s = (tw - 0.82) * 9;          // tamaño 0→1.6
      ctx.globalAlpha = (tw - 0.82) * 4;
      ctx.beginPath();
      ctx.arc(sx, sy, s, 0, Math.PI * 2);
      ctx.fill();
      // cruz de destello
      ctx.fillRect(sx - s * 3, sy - 0.4, s * 6, 0.8);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  };

  // ──────────────────────────────────────────────
  // 2) PROFUNDIDAD: manchas con gradiente suave
  //    (reemplaza drawDepthSpots — bordes difusos = fondo creíble)
  // ──────────────────────────────────────────────
  window.drawDepthSpots = function drawDepthSpots() {
    ctx.save();
    const seed = State.currentLevelIdx * 7919;
    for (let i = 0; i < 9; i++) {
      const sx = ((seed * (i + 1) * 1103515245 + 12345) % 100000) / 100000 * State.world.width;
      const sy = ((seed * (i + 1) * 2531011 + 12345) % 100000) / 100000 * State.world.height;
      const rw = 110 + (i * 13) % 70;
      const drift = Math.sin(State.animTime * 0.0003 + i) * 6; // la sombra "respira"
      const g = ctx.createRadialGradient(sx, sy + drift, rw * 0.15, sx, sy + drift, rw);
      g.addColorStop(0, 'rgba(8, 48, 60, 0.30)');
      g.addColorStop(0.7, 'rgba(10, 55, 66, 0.16)');
      g.addColorStop(1, 'rgba(10, 55, 66, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(sx, sy + drift, rw, rw * 0.5, i * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  };

  // ──────────────────────────────────────────────
  // 3) ESTELA REAL DEL NADADOR (wake trail)
  //    Partículas de espuma detrás del jugador que se
  //    expanden y desvanecen, como en agua de verdad.
  // ──────────────────────────────────────────────
  const Wake = { parts: [], lastEmit: 0 };

  function wakeUpdate(dt) {
    const p = State.player;
    if (!p) return;
    const now = performance.now();
    const moving = Math.hypot(p.vx || 0, p.vy || 0) > 0.6;
    const inWater = !p.onLand;

    if (moving && inWater && now - Wake.lastEmit > 55) {
      Wake.lastEmit = now;
      // Emite detrás del nadador, con dispersión lateral
      const back = p.angle + Math.PI;
      const spread = (Math.random() - 0.5) * 14;
      const px = -Math.sin(p.angle) * spread;
      const py = Math.cos(p.angle) * spread;
      Wake.parts.push({
        x: p.x + Math.cos(back) * 20 + px,
        y: p.y + Math.sin(back) * 20 + py,
        r: 3 + Math.random() * 3,
        life: 1,
        vr: 0.10 + Math.random() * 0.08,   // velocidad de expansión
      });
      // Burbuja pequeña ocasional
      if (Math.random() < 0.5) {
        Wake.parts.push({
          x: p.x + Math.cos(back) * 30 + (Math.random() - 0.5) * 16,
          y: p.y + Math.sin(back) * 30 + (Math.random() - 0.5) * 16,
          r: 1 + Math.random() * 1.5,
          life: 0.8,
          vr: 0.02,
          bubble: true,
        });
      }
      if (Wake.parts.length > 90) Wake.parts.splice(0, Wake.parts.length - 90);
    }
    // Envejecer
    for (let i = Wake.parts.length - 1; i >= 0; i--) {
      const w = Wake.parts[i];
      w.life -= dt * 0.0011;
      w.r += w.vr * dt * 0.06;
      if (w.life <= 0) Wake.parts.splice(i, 1);
    }
  }

  function wakeDraw() {
    if (!Wake.parts.length) return;
    ctx.save();
    for (const w of Wake.parts) {
      const a = Math.max(0, w.life);
      if (w.bubble) {
        ctx.strokeStyle = 'rgba(255,255,255,' + (a * 0.55).toFixed(3) + ')';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        const g = ctx.createRadialGradient(w.x, w.y, w.r * 0.2, w.x, w.y, w.r);
        g.addColorStop(0, 'rgba(255,255,255,' + (a * 0.30).toFixed(3) + ')');
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }

  // Hook al update existente (sin tocar el original)
  const _origUpdate = window.update;
  window.update = function (dt) {
    _origUpdate(dt);
    if (State.screen === 'playing' || State.screen === 'finishing') wakeUpdate(dt);
  };

  // Hook al render: drawTowBuoy se llama en espacio de mundo justo antes
  // del jugador → dibujamos la estela primero y luego la boya original.
  const _origTow = window.drawTowBuoy;
  window.drawTowBuoy = function () {
    wakeDraw();
    _origTow();
  };

  // ──────────────────────────────────────────────
  // 4) FONDO CON HORIZONTE DE COLOR (gradiente más rico)
  //    Tinte por distancia a la playa: agua somera clara junto a la
  //    arena, profunda hacia el centro. Se dibuja como velo encima
  //    del fondo, antes de las sombras de profundidad.
  // ──────────────────────────────────────────────
  const _origDepth = window.drawDepthSpots;
  window.drawDepthSpots = function () {
    // Velo de agua somera junto a las playas (verde-turquesa claro)
    const w = State.world;
    if (w && w.beachStart) {
      const b = w.beachStart;
      const edgeX = b.x + b.w;
      const g = ctx.createLinearGradient(edgeX, 0, edgeX + 220, 0);
      g.addColorStop(0, 'rgba(190, 240, 230, 0.30)');
      g.addColorStop(0.5, 'rgba(140, 215 ,205, 0.12)');
      g.addColorStop(1, 'rgba(140, 215, 205, 0)');
      ctx.fillStyle = g;
      ctx.fillRect(edgeX, b.y, 220, b.h);
    }
    _origDepth();
  };

})();
</script>
